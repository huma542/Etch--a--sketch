<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Etch- a-Sketch</title>
</head>

<body>
    <div class="main-container">
        <div class="content">
            <h1>Etch-a-sketch</h1>
            <div class="sidebar">
                <button id="black" class="set">Black color</button>
                <button id="rainbow" class="set">Rainbow color</button>
                <button id="gray" class="set">Shade of gray</button>
                <label for="grid-size">Grid Sizing: <span id="size-display">16 *16</span></label>
                <input type="range" id="grid-size" min="1" max="100" step="1" value="16">
                <button class="set" id="clear">Clear</button>
            </div>
        </div>

        <div class="container"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
